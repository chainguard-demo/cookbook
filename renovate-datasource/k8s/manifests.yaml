apiVersion: v1
kind: ServiceAccount
metadata:
  name: renovate-datasource
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: renovate-datasource
  labels:
    app.kubernetes.io/name: renovate-datasource
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: renovate-datasource
  template:
    metadata:
      labels:
        app.kubernetes.io/name: renovate-datasource
    spec:
      serviceAccountName: renovate-datasource
      containers:
        - name: app
          image: CHANGE_ME_IMAGE
          args:
            - --org=CHANGE_ME_ORG
            - --identity=CHANGE_ME_IDENTITY
            - --identity-token=/var/run/secrets/chainguard/token
            - --cooldown=168h
            - --port=8080
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: chainguard-token
              mountPath: /var/run/secrets/chainguard
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: chainguard-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: issuer.enforce.dev
                  expirationSeconds: 3600
                  path: token
---
apiVersion: v1
kind: Service
metadata:
  name: renovate-datasource
  labels:
    app.kubernetes.io/name: renovate-datasource
spec:
  selector:
    app.kubernetes.io/name: renovate-datasource
  ports:
    - name: http
      port: 80
      targetPort: http
